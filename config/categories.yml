# Canonical IndustryTab categories for morning_brief (plan v2 §D10-A).
#
# D10-A chose full rename + one-shot migration (scripts/migrate_categories.py)
# rather than carrying a 9-way Literal union forever. Legacy names
# (Food, Beauty, Fashion, Living, Hospitality) are accepted ONLY during the
# migration pass via ``legacy_aliases`` — no runtime code should rely on them
# after PR-1 merges.
#
# Canonical keys (match morning_brief.models.Category):
#   식음료 | 뷰티 | 패션 | 라이프스타일 | 소비트렌드 | MacroTrends
#
# PR-2 QA Issue C: the food & beverage tab uses "식음료" as the canonical
# Korean label (consistent with the other Korean tabs). "F&B" remains an
# accepted legacy alias so pre-migration briefing.db rows + older EML
# fixtures continue to load.

schema_version: v2

categories:
