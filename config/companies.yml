# Canonical company list for morning_brief (plan v2 §D3 / PR-1 Task 1).
#
# 3-class schema:
#   - 대기업          (enterprise: diversified conglomerates, blue-chips)
#   - 유통            (distributor: retailers, e-commerce, marketplaces)
#   - 혁신스타트업     (innovative startup: digitally-native / high-growth)
#
# Each entry must carry:
#   name       - canonical display form (Korean or English)
#   class      - one of the 3 values above
#   aliases    - list of alternate surface forms (latinization, abbreviations)
#   categories - list of IndustryTab categories the company is relevant to.
#                Must draw from categories.yml keys:
#                {식음료, 뷰티, 패션, 라이프스타일, 소비트렌드, MacroTrends}
#
# Seed set: ≥30 well-known Korean + global consumer companies across the
# 5 industry tabs. No TrendLab506-proprietary information — all entries are
# public brands sourced from mainstream business press.

schema_version: v1

classes:
  - 대기업
  - 유통
  - 혁신스타트업

